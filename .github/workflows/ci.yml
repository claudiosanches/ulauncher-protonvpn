name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          pip-version: '26'
          cache: pip
          cache-dependency-path: pyproject.toml
          pip-install: --group ci

      - name: Check whitespace
        run: |
          git diff --check

      - name: Run Ruff lint
        run: |
          ruff check main.py src tests

      - name: Check Ruff formatting
        run: |
          ruff format --check main.py src tests

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          pip-version: '26'
          cache: pip
          cache-dependency-path: pyproject.toml
          pip-install: --group ci

      - name: Run Pyright
        run: |
          pyright

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          pip-version: '26'
          cache: pip
          cache-dependency-path: pyproject.toml
          pip-install: --group ci

      - name: Run pytest
        run: |
          pytest
